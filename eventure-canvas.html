// ---- Lucide wrapper -------------------------------------------------------
// Renders <i data-lucide="..."> and relies on lucide.createIcons() to swap it
// for an <svg>. We refresh icons in a top-level useEffect after every render.
function makeLucide(kebab) {
  return function LucideIcon({ size = 16, className = '', strokeWidth = 2, color, style, ...rest }) {
    return (
      <i
        data-lucide={kebab}
        data-stroke-width={strokeWidth}
        className={className}
        style={{ width: size, height: size, color, ...(style || {}) }}
        {...rest}
      />
    );
  };
}

const EventTaskBoardPage = ({ eventId, clubId, onBack }) => {
  const [activeTab, setActiveTab] = useState('Board');
  const [kanbanData, setKanbanData] = useState(MOCK_KANBAN);
  const [isCreateTaskOpen, setIsCreateTaskOpen] = useState(false);
  const [filterTag, setFilterTag] = useState('All');
  const [showFilterDropdown, setShowFilterDropdown] = useState(false);
  const [selectedTask, setSelectedTask] = useState(null);
  const event = MOCK_EVENTS.find(e => e.id === eventId);
  const club = MOCK_CLUBS.find(c => c.id === clubId);
  if (!event) return null;

  const handleCreateTask = (data) => {
    const tagStyles = { Design: "bg-purple-100 text-purple-700", Finance: "bg-orange-100 text-orange-700", Operations: "bg-pink-100 text-pink-700", Tech: "bg-blue-100 text-blue-700", Logistics: "bg-green-100 text-green-700", Marketing: "bg-red-100 text-red-700" };
    const newTask = { id: Date.now(), title: data.title, desc: data.desc, tag: data.tag, tagColor: tagStyles[data.tag] || "bg-gray-100 text-gray-700", avatars: ["11"], due: data.due ? new Date(data.due).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : "No Date", colorMark: "bg-[#1a6b6e]", done: data.column === 'done' };
    setKanbanData(prev => ({ ...prev, [data.column]: [newTask, ...prev[data.column]] }));
  };

  const getFilteredTasks = (tasks) => filterTag === 'All' ? tasks : tasks.filter(t => t.tag === filterTag);
  const allTasks = [
    ...kanbanData.backlog.map(t => ({...t, status: 'Backlog'})),
    ...kanbanData.inProgress.map(t => ({...t, status: 'In Progress'})),
    ...kanbanData.review.map(t => ({...t, status: 'Review'})),
    ...kanbanData.done.map(t => ({...t, status: 'Done'}))
  ];

  const renderTaskCard = (task, statusName) => {
    if (task.done) {
      return (
        <div key={task.id} onClick={() => setSelectedTask({...task, status: statusName})} className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 cursor-pointer hover:border-gray-300 mb-3">
          <span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide ${task.tagColor}`}>{task.tag}</span>
          <div className="mt-2 text-sm font-semibold text-gray-500 line-through">{task.title}</div>
          <div className="mt-3 flex items-center justify-between">
            <div className="flex -space-x-1.5">{task.avatars.map((av, i) => (<img key={i} src={`https://i.pravatar.cc/150?img=${av}`} className="w-5 h-5 rounded-full border border-white" alt="avatar"/>))}</div>
            <span className="text-xs text-green-600 font-semibold flex items-center gap-1"><CheckCircle2 size={12}/> Done</span>
          </div>
        </div>
      );
    }
    return (
      <div key={task.id} onClick={() => setSelectedTask({...task, status: statusName})} className="bg-white p-3.5 rounded-xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md group mb-3">
        <div className="flex justify-between items-start mb-2"><span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wide ${task.tagColor}`}>{task.tag}</span></div>
        <h4 className="text-sm font-bold text-gray-800 leading-snug mb-1 group-hover:text-[#1a6b6e]">{task.title}</h4>
        {task.desc && <p className="text-xs text-gray-500 leading-snug mb-3 line-clamp-2">{task.desc}</p>}
        <div className="mt-4 flex items-center justify-between border-t border-gray-50 pt-2">
          <div className="flex items-center gap-2">
            <div className={`w-2 h-2 rounded-full ${task.colorMark}`}></div>
            {task.progress
              ? <span className="text-xs font-semibold text-gray-600 flex items-center gap-1"><CheckSquare size={12} className="text-gray-400"/> {task.progress}</span>
              : <span className="text-xs font-semibold text-gray-500 flex items-center gap-1"><Calendar size={12}/> {task.due}</span>}
          </div>
          <div className="flex -space-x-1.5">{task.avatars.map((av, i) => (<img key={i} src={`https://i.pravatar.cc/150?img=${av}`} className="w-6 h-6 rounded-full border-2 border-white shadow-sm" alt="avatar"/>))}</div>
        </div>
      </div>
    );
  };

  return (
    <div className="flex flex-col h-full bg-[#f5f0eb] anim-fade">
      <div className="bg-[#174646] text-white px-8 py-5 flex-shrink-0">
        <div className="flex items-center gap-2 mb-4"><button onClick={onBack} className="text-teal-200 hover:text-white flex items-center text-sm font-semibold"><ArrowLeft size={16} /> Back</button></div>
        <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
          <div>
            <div className="flex items-center gap-3 mb-1">
              <h1 className="text-2xl font-bold">{event.title}</h1>
              <span className="text-xs font-semibold bg-white/20 px-2 py-1 rounded">Task Board • {club?.name}</span>
            </div>
            <div className="flex items-center gap-4 text-sm text-teal-100 font-medium">
              <span className="flex items-center gap-1.5"><Calendar size={14}/> {event.date}</span>
              <span className="flex items-center gap-1.5"><Users size={14}/> 24 members</span>
              <span className="flex items-center gap-1.5"><CheckSquare size={14}/> {allTasks.length} tasks</span>
            </div>
          </div>
          <div className="flex items-center gap-3 relative">
            <button onClick={() => setShowFilterDropdown(!showFilterDropdown)}
              className={`bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 border border-white/20 ${filterTag !== 'All' ? 'bg-white/30 border-white/50' : ''}`}>
              <ListFilter size={16}/> {filterTag === 'All' ? 'Filter' : filterTag}
            </button>
            {showFilterDropdown && (
              <>
                <div className="fixed inset-0 z-10" onClick={() => setShowFilterDropdown(false)}></div>
                <div className="absolute top-full right-[104px] mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-100 z-20 py-1 flex flex-col text-left">
                  <div className="px-3 py-1.5 text-xs font-bold text-gray-400 uppercase tracking-wider">Filter by Tag</div>
                  {['All', 'Design', 'Finance', 'Logistics', 'Marketing', 'Operations', 'Tech'].map(tag => (
                    <button key={tag} onClick={() => { setFilterTag(tag); setShowFilterDropdown(false); }}
                      className={`px-4 py-2 text-sm text-left w-full hover:bg-gray-50 ${filterTag === tag ? 'text-[#1a6b6e] font-bold bg-teal-50' : 'text-gray-700'}`}>{tag}</button>
                  ))}
                </div>

          <div className="max-w-6xl mx-auto space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center gap-4"><div className="w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center"><DollarSign size={24}/></div><div><p className="text-sm font-semibold text-gray-500">Total Budget</p><h3 className="text-2xl font-bold text-gray-900">$5,000</h3></div></div>
              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center gap-4"><div className="w-12 h-12 bg-orange-50 text-orange-600 rounded-full flex items-center justify-center"><PieChart size={24}/></div><div><p className="text-sm font-semibold text-gray-500">Total Spent</p><h3 className="text-2xl font-bold text-gray-900">$2,850</h3></div></div>
              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center gap-4"><div className="w-12 h-12 bg-green-50 text-green-600 rounded-full flex items-center justify-center"><TrendingUp size={24}/></div><div><p className="text-sm font-semibold text-gray-500">Remaining</p><h3 className="text-2xl font-bold text-green-600">$2,150</h3></div></div>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
              <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 className="font-bold text-gray-800">Expense Breakdown</h3>
                <button className="bg-[#1a6b6e] text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-[#155758] shadow-sm flex items-center gap-2"><Plus size={16}/> Add Expense</button>
              </div>
              <table className="w-full text-left">
                <thead className="border-b border-gray-200 text-xs text-gray-500 uppercase font-semibold">
                  <tr><th className="px-6 py-4">Item description</th><th className="px-6 py-4">Category</th><th className="px-6 py-4">Date</th><th className="px-6 py-4">Status</th><th className="px-6 py-4 text-right">Amount</th></tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {MOCK_BUDGET.map(item => (
                    <tr key={item.id} className="hover:bg-gray-50">
                      <td className="px-6 py-4 font-semibold text-sm text-gray-800">{item.item}</td>
                      <td className="px-6 py-4 text-sm text-gray-600">{item.category}</td>
                      <td className="px-6 py-4 text-sm text-gray-500">{item.date}</td>
                      <td className="px-6 py-4"><span className={`text-xs font-bold px-2 py-1 rounded ${item.status === 'Paid' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{item.status}</span></td>
                      <td className="px-6 py-4 text-sm font-bold text-gray-900 text-right">${item.amount.toLocaleString()}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {activeTab === 'Files' && (
        <div className="flex-1 overflow-y-auto p-6 anim-fade flex items-center justify-center">
          <div className="text-center max-w-md bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
            <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4"><Folder size={32} /></div>
            <h3 className="text-xl font-bold text-gray-900 mb-2">Event Shared Drive</h3>
            <p className="text-gray-500 text-sm mb-6">All documents, assets, and files for this event are managed in a centralized Google Drive folder.</p>
            <div className="bg-gray-50 border border-gray-200 rounded-lg p-3 mb-6 flex items-center justify-between">
              <span className="text-xs text-gray-500 truncate mr-3">https://drive.google.com/drive/folders/1XyZ...</span>
              <button className="text-teal-600 hover:text-teal-700 text-xs font-semibold px-3 py-1.5 bg-teal-50 rounded-md hover:bg-teal-100">Copy</button>
            </div>
            <div className="flex flex-col gap-3">
              <a href="#" className="w-full bg-[#1a6b6e] text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-[#155758] shadow-sm flex items-center justify-center gap-2"><ExternalLink size={18} /> Open Google Drive</a>
              <button className="text-teal-600 text-sm font-semibold hover:underline mt-2">Edit Drive Link</button>
            </div>
          </div>
        </div>
      )}

      <CreateTaskModal isOpen={isCreateTaskOpen} onClose={() => setIsCreateTaskOpen(false)} onCreate={handleCreateTask} />
      <TaskDetailsModal isOpen={!!selectedTask} onClose={() => setSelectedTask(null)} task={selectedTask} />
    </div>
  );
};

const EventsPage = () => {
  const [isCreateEventOpen, setIsCreateEventOpen] = useState(false);
  return (
    <div className="p-8 max-w-7xl mx-auto space-y-6 anim-fade">
      <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <h1 className="text-3xl font-bold text-gray-900 mb-1">Events</h1>
          <p className="text-gray-600 text-sm">Manage and discover all activities across your clubs.</p>
        </div>
        <div className="flex items-center gap-3">
          <div className="relative">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Search size={18}/></span>
            <input type="text" placeholder="Search events..." className="pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-[#1a6b6e] text-sm w-64 shadow-sm"/>
          </div>
          <button className="p-2.5 border border-gray-200 rounded-lg hover:bg-white text-gray-600 shadow-sm"><Filter size={18} /></button>
          <button onClick={() => setIsCreateEventOpen(true)} className="bg-[#1a6b6e] hover:bg-[#155758] text-white px-4 py-2.5 rounded-lg font-semibold flex items-center gap-2 shadow-sm text-sm"><Plus size={18} /> Create Event</button>
        </div>
      </div>
      <div className="flex gap-6 border-b border-gray-200">
        {['All Events', 'Upcoming', 'Drafts', 'Past'].map((tab, i) => (
          <button key={tab} className={`pb-3 text-sm font-semibold border-b-2 ${i === 0 ? 'border-[#1a6b6e] text-[#1a6b6e]' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>{tab}</button>
        ))}
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pt-2">
        {MOCK_EVENTS.map((event) => (
          <div key={event.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md group flex flex-col cursor-pointer">
            <div className={`h-24 ${event.color} relative p-4 flex flex-col justify-between`}>
              <div className="flex justify-between items-start">
                <span className="bg-white/20 backdrop-blur-sm text-white px-2 py-1 rounded text-xs font-bold tracking-wide">{event.club}</span>
                <button className="text-white/80 hover:text-white bg-black/10 hover:bg-black/20 p-1 rounded"><MoreHorizontal size={16} /></button>
              </div>
            </div>
            <div className="p-5 flex-1 flex flex-col">
              <h3 className="font-bold text-lg text-gray-900 leading-tight group-hover:text-[#1a6b6e] mb-3 pr-4">{event.title}</h3>
              <div className="space-y-2 mb-6 flex-1">
                <div className="flex items-center gap-2 text-sm text-gray-600 font-medium"><Calendar size={16} className="text-gray-400" />{event.date}</div>
                <div className="flex items-center gap-2 text-sm text-gray-600 font-medium"><MapPin size={16} className="text-gray-400" /><span className="truncate">{event.location}</span></div>
              </div>
              <div className="pt-4 border-t border-gray-100 flex items-center justify-between">
                <span className={`text-xs px-2.5 py-1 rounded-full font-semibold ${event.badge}`}>{event.status}</span>
                <div className="flex items-center gap-1.5 text-xs font-semibold text-gray-500"><Users size={14} />{event.attendees}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
      <CreateEventModal isOpen={isCreateEventOpen} onClose={() => setIsCreateEventOpen(false)} />
    </div>
  );
};

function App() {
  const [activePage, setActivePage] = useState('dashboard');
  const [selectedClubId, setSelectedClubId] = useState(null);
  const [selectedEventId, setSelectedEventId] = useState(null);
  const [showNotifications, setShowNotifications] = useState(false);

  // Re-render lucide icons after every React render
  useEffect(() => {
    if (window.lucide && typeof window.lucide.createIcons === 'function') {
      window.lucide.createIcons();
    }
  });

  const handlePageChange = (page) => {
    setActivePage(page);
    setShowNotifications(false);
    if (page !== 'clubs') { setSelectedClubId(null); setSelectedEventId(null); }
  };

  return (
    <div className="flex h-screen w-full bg-[#f5f0eb] font-sans overflow-hidden">
      <Sidebar activePage={activePage} setActivePage={handlePageChange} />
      <main className="flex-1 ml-[260px] flex flex-col h-screen overflow-hidden">
        {!selectedEventId && (
          <header className="h-[72px] bg-white border-b border-gray-200 flex items-center justify-end px-8 flex-shrink-0">
            <div className="flex items-center gap-4">
              <div className="relative">
                <button onClick={() => setShowNotifications(!showNotifications)}
                  className={`w-10 h-10 rounded-full flex items-center justify-center relative ${showNotifications ? 'bg-teal-50 text-teal-600' : 'bg-gray-50 hover:bg-gray-100 text-gray-500'}`}>
                  <Bell size={20} />
                  <span className="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
                {showNotifications && (
                  <>
                    <div className="fixed inset-0 z-40" onClick={() => setShowNotifications(false)}></div>
                    <div className="absolute top-full right-0 mt-3 w-80 md:w-96 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden z-50">
                      <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                        <h3 className="font-bold text-gray-800">Notifications</h3>
                        <button className="text-xs text-[#1a6b6e] font-semibold hover:underline">Mark all as read</button>
                      </div>
                      <div className="max-h-[400px] overflow-y-auto divide-y divide-gray-50">
                        {MOCK_NOTIFICATIONS.slice(0, 3).map(notif => (
                          <div key={notif.id} className={`p-4 flex gap-4 hover:bg-gray-50 ${!notif.read ? 'bg-teal-50/30' : ''}`}>
                            <div className="flex-shrink-0 mt-1">
                              {notif.type === 'invite' && <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center"><UserPlus size={16}/></div>}
                              {notif.type === 'task' && <div className="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center"><CheckSquare size={16}/></div>}
                              {notif.type === 'reminder' && <div className="w-8 h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center"><Calendar size={16}/></div>}
                            </div>
                            <div className="flex-1">
                              {notif.type === 'invite' && (<>
                                <p className="text-sm text-gray-800 leading-snug"><span className="font-bold">{notif.sender}</span> invited you to join <span className="font-bold">{notif.club}</span>.</p>
                                <div className="flex items-center gap-2 mt-3">
                                  <button className="flex-1 bg-[#1a6b6e] text-white py-1.5 rounded-lg text-xs font-semibold hover:bg-[#155758]">Accept</button>
                                  <button className="flex-1 bg-gray-100 text-gray-700 py-1.5 rounded-lg text-xs font-semibold hover:bg-gray-200 border border-gray-200">Decline</button>
                                </div>
                              </>)}
                              {notif.type === 'task' && <p className="text-sm text-gray-800 leading-snug">You were assigned a task: <span className="font-medium text-gray-900">"{notif.title}"</span> in <span className="font-medium">{notif.event}</span>.</p>}
                              {notif.type === 'reminder' && <p className="text-sm text-gray-800 leading-snug">{notif.title}</p>}
                              <p className="text-[11px] font-bold text-gray-400 mt-1.5 uppercase tracking-wide">{notif.time}</p>
                            </div>
                            {!notif.read && <div className="w-2 h-2 rounded-full bg-[#1a6b6e] mt-1.5 flex-shrink-0"></div>}
                          </div>
                        ))}
                      </div>
                      <div onClick={() => handlePageChange('notifications')} className="p-3 border-t border-gray-100 text-center bg-gray-50 hover:bg-gray-100 cursor-pointer"><span className="text-xs font-bold text-gray-600">View all notifications</span></div>
                    </div>
                  </>
                )}
              </div>
              <div className="h-6 w-px bg-gray-200"></div>
              <div className="flex items-center gap-3">
                <span className="text-sm font-semibold text-gray-700">{MOCK_USER.name}</span>
                <img src={MOCK_USER.avatar} alt="Profile" className="w-8 h-8 rounded-full border border-gray-200" />
              </div>
            </div>
          </header>
        )}
        <div className="flex-1 overflow-y-auto">
          {activePage === 'dashboard' && <DashboardPage />}
          {activePage === 'notifications' && <NotificationsPage />}
          {activePage === 'clubs' && !selectedClubId && !selectedEventId && (<ClubsPage onClubSelect={(id) => setSelectedClubId(id)} />)}
          {activePage === 'clubs' && selectedClubId && !selectedEventId && (<ClubDetailsPage clubId={selectedClubId} onBack={() => setSelectedClubId(null)} onEventSelect={(id) => setSelectedEventId(id)} />)}
          {activePage === 'clubs' && selectedClubId && selectedEventId && (<EventTaskBoardPage eventId={selectedEventId} clubId={selectedClubId} onBack={() => setSelectedEventId(null)} />)}
          {activePage === 'events' && <EventsPage />}
          {activePage === 'tasks' && <MyTasksPage />}
        </div>
      </main>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
